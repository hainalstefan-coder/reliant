# Max Retries Exhausted: Loop exits after hitting the retry limit
#
# Tests the loop's max_retries safeguard with evaluate → refactor:
# 1. max_retries set to 2
# 2. Iteration 0: review fails, evaluate says 'improve', refactor applies fixes
# 3. Iteration 1: review fails again, evaluate says 'improve', refactor applies fixes
# 4. Loop exits: iter.iteration(2) == max_retries(2)
#
# Verifies the loop correctly stops when max_retries is reached,
# even if evaluate never says "proceed".

name: max_retries_exhausted
description: Loop exits after max_retries iterations without reaching proceed

inputs:
  steps: [implement, code_review, evaluate, refactor]
  max_retries: 2

events:
  # Iteration 0 — review fails, evaluate says improve
  - node: impl_loop.implement
    output:
      response_text: "First implementation attempt."

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "Fundamental design flaw."
        suggestions:
          - "Rethink the data model"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "Code review found fundamental design flaw in the data model."
        improvements:
          - area: "Data model"
            suggestion: "Restructure the data model to match the existing schema patterns."
            severity: critical

  - node: impl_loop.refactor
    output:
      response_text: "Restructured data model to follow existing patterns."

  # Iteration 1 — review fails again, evaluate says improve (max_retries reached)
  - node: impl_loop.implement
    output:
      response_text: "Second attempt, still flawed."

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "Still has design issues."
        suggestions:
          - "Consider a different approach entirely"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "Still failing review. The data model fix wasn't sufficient."
        improvements:
          - area: "Approach"
            suggestion: "Consider a completely different approach to the data model."
            severity: critical

  - node: impl_loop.refactor
    output:
      response_text: "Applied further data model changes but fundamental issues remain."

  # Loop exits: iter.iteration(2) == max_retries(2)

expect:
  outcome: completed
  reached:
    - planning
    - impl_loop
    - impl_loop.implement
    - impl_loop.join_checks
    - impl_loop.code_review
    - impl_loop.evaluate
    - impl_loop.refactor
    - max_retries_reached
  not_reached:
    - planning.plan
    - write_tests
    - start_app
    - impl_loop.lint
    - impl_loop.test
    - impl_loop.build
    - success
