# Multiple Checks Fail: Lint, test, and build all fail, evaluate says restart
#
# Tests the parallel failure path where all three checks fail at once:
# 1. Iteration 0: implement runs, lint/test/build all fail, review fails
# 2. Evaluate says "restart" — approach is fundamentally wrong
# 3. Refactor scraps and restructures
# 4. Iteration 1: all checks pass, review passes, evaluate says "proceed"
# 5. Refactor skipped, loop exits
#
# Verifies that multiple simultaneous failures trigger the evaluate → refactor path
# and that the "restart" strategy results in a clean second attempt.

name: multiple_checks_fail
description: All three checks fail, evaluate says restart, refactor restructures, passes on retry

inputs:
  steps: [implement, lint, test, build, code_review, evaluate, refactor]

events:
  # Iteration 0 — all checks fail, evaluate says restart
  - node: impl_loop.implement
    output:
      response_text: "Rough first implementation."

  - node: impl_loop.lint
    output:
      exit_code: 1

  - node: impl_loop.test
    output:
      exit_code: 1

  - node: impl_loop.build
    output:
      exit_code: 1

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "All checks failing. Major rework needed."
        suggestions:
          - "Fix lint errors"
          - "Fix failing tests"
          - "Fix compilation errors"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "restart"
        diagnosis: "All three checks failed simultaneously. The implementation approach is fighting the codebase — lint errors suggest wrong coding patterns, test failures indicate wrong data model assumptions, build failure indicates missing dependencies. Start fresh."
        improvements:
          - area: "Coding patterns"
            suggestion: "Follow the existing coding style conventions. Check .eslintrc for the expected patterns."
            severity: critical
          - area: "Data model"
            suggestion: "Review the test fixtures to understand the expected data shapes before implementing."
            severity: critical
          - area: "Dependencies"
            suggestion: "Check package.json for available dependencies before importing."
            severity: critical

  - node: impl_loop.refactor
    output:
      response_text: "Reverted all changes. Restructured approach: reviewed eslint config, test fixtures, and package dependencies. Set up clean foundation matching codebase conventions."

  # Iteration 1 — all checks pass
  - node: impl_loop.implement
    output:
      response_text: "Clean implementation following codebase conventions."

  - node: impl_loop.lint
    output:
      exit_code: 0

  - node: impl_loop.test
    output:
      exit_code: 0

  - node: impl_loop.build
    output:
      exit_code: 0

  - node: impl_loop.code_review
    output:
      response:
        grade: pass
        summary: "All checks pass. Clean implementation."
        suggestions: []

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "All checks pass, code review approved. Clean implementation."
        improvements: []

expect:
  outcome: completed
  reached:
    - planning
    - impl_loop
    - impl_loop.implement
    - impl_loop.lint
    - impl_loop.test
    - impl_loop.build
    - impl_loop.join_checks
    - impl_loop.code_review
    - impl_loop.evaluate
    - impl_loop.refactor
    - success
  not_reached:
    - planning.plan
    - write_tests
    - start_app
