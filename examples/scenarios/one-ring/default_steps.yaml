# Default Steps: Plan, Implement, Evaluate, Code Review — all pass first try
#
# Tests the default configuration with no input overrides:
# 1. Planning sub-workflow runs, plan agent produces a plan
# 2. Implementation loop runs once
# 3. Code review passes, evaluate says "proceed" → refactor skipped → loop exits
#
# Verifies the happy path through the default one-ring pipeline.
# Note: lint, test, build, tdd, start_app are not in default steps, so they're skipped.

name: default_steps
description: Default steps (plan, implement, evaluate, code_review) all pass on first try

# Uses default inputs: steps: [plan, implement, evaluate, code_review]

events:
  # Planning sub-workflow — plan agent produces a summary
  - node: planning.plan
    output:
      response_text: "Plan: implement the feature with modular design."

  # Implementation loop — iteration 0
  - node: impl_loop.implement
    output:
      response_text: "Implemented the feature as planned."

  - node: impl_loop.code_review
    output:
      response:
        grade: pass
        summary: "Clean implementation following the plan."
        suggestions:
          - "Consider adding inline comments for complex logic"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "Implementation is correct. Code review passed. All good."
        improvements: []

  # refactor skipped (evaluate strategy == "proceed")

expect:
  outcome: completed
  reached:
    - planning
    - planning.plan
    - impl_loop
    - impl_loop.implement
    - impl_loop.join_checks
    - impl_loop.code_review
    - impl_loop.evaluate
    - success
  not_reached:
    - write_tests
    - start_app
    - impl_loop.lint
    - impl_loop.test
    - impl_loop.build
    - impl_loop.refactor
