# Test Retry: Tests fail, evaluate says improve, refactor fixes, second attempt passes
#
# Tests the evaluate → refactor loop triggered by failing tests:
# 1. Iteration 0: implement runs, test fails, review fails, evaluate says 'improve', refactor fixes
# 2. Loop condition: eval_strategy != "proceed" → re-iterate
# 3. Iteration 1: implement runs, test passes, review passes, evaluate says 'proceed'
# 4. Refactor skipped, loop exits

name: test_fails_then_passes
description: Tests fail, evaluate triggers refactor, pass on retry

inputs:
  steps: [implement, test, code_review, evaluate, refactor]

events:
  # Iteration 0 — test fails
  - node: impl_loop.implement
    output:
      response_text: "Implementation with failing tests."

  - node: impl_loop.test
    output:
      exit_code: 1

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "Tests are failing. Fix before merge."
        suggestions:
          - "Fix the 2 failing test assertions"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "Two test assertions failing. The implementation logic doesn't match expected behavior."
        improvements:
          - area: "Test assertions"
            suggestion: "Fix the 2 failing assertions — the return value format doesn't match what tests expect."
            severity: critical

  - node: impl_loop.refactor
    output:
      response_text: "Fixed the return value format to match test expectations. Both assertions should pass now."

  # Iteration 1 — test passes, review passes
  - node: impl_loop.implement
    output:
      response_text: "Built on refactored code. Tests verified."

  - node: impl_loop.test
    output:
      exit_code: 0

  - node: impl_loop.code_review
    output:
      response:
        grade: pass
        summary: "All tests pass. Implementation approved."
        suggestions: []

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "Tests pass, review approved. Implementation is correct."
        improvements: []

expect:
  outcome: completed
  reached:
    - planning
    - impl_loop
    - impl_loop.implement
    - impl_loop.test
    - impl_loop.join_checks
    - impl_loop.code_review
    - impl_loop.evaluate
    - impl_loop.refactor
    - success
  not_reached:
    - planning.plan
    - write_tests
    - start_app
    - impl_loop.lint
    - impl_loop.build
