# Test Retry: Tests fail on iteration 0, pass on iteration 1
#
# Tests the loop re-iteration triggered by failing tests:
# 1. Iteration 0: implement runs, test fails (exit_code: 1), review also fails
# 2. Loop condition: test_exit != 0 → re-iterate
# 3. Iteration 1: implement runs again, test passes (exit_code: 0), review passes
# 4. Loop exits
#
# Verifies that a non-zero test exit_code triggers re-iteration.
# Note: test is a `type: run` node — mock its exit_code directly.

name: test_fails_then_passes
description: Tests fail on first iteration, pass on retry

inputs:
  steps: [implement, test, code_review]

events:
  # Iteration 0 — test fails
  - node: impl_loop.implement
    output:
      response_text: "Implementation with failing tests."

  - node: impl_loop.test
    output:
      exit_code: 1

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "Tests are failing. Fix before merge."
        suggestions:
          - "Fix the 2 failing test assertions"

  # Iteration 1 — test passes, review passes
  - node: impl_loop.implement
    output:
      response_text: "Fixed failing test cases."

  - node: impl_loop.test
    output:
      exit_code: 0

  - node: impl_loop.code_review
    output:
      response:
        grade: pass
        summary: "All tests pass. Implementation approved."
        suggestions: []

expect:
  outcome: completed
  reached:
    - planning
    - impl_loop
    - impl_loop.implement
    - impl_loop.test
    - impl_loop.join_checks
    - impl_loop.code_review
    - complete
  not_reached:
    - planning.plan
    - write_tests
    - start_app
    - impl_loop.lint
    - impl_loop.build
