# Lint Retry: Lint fails, evaluate says improve, refactor fixes, second attempt passes
#
# Tests the evaluate → refactor loop triggered by a failing lint check:
# 1. Iteration 0: implement runs, lint fails, review fails, evaluate says 'improve', refactor fixes
# 2. Loop condition: eval_strategy != "proceed" → re-iterate
# 3. Iteration 1: implement runs, lint passes, review passes, evaluate says 'proceed'
# 4. Refactor skipped, loop exits

name: lint_fails_then_passes
description: Lint fails, evaluate triggers refactor, passes on retry

inputs:
  steps: [implement, lint, code_review, evaluate, refactor]

events:
  # Iteration 0 — lint fails
  - node: impl_loop.implement
    output:
      response_text: "Implementation with style issues."

  - node: impl_loop.lint
    output:
      exit_code: 1

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "Lint errors must be fixed before approval."
        suggestions:
          - "Fix the 3 linting violations"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "Lint failed with 3 violations. Straightforward fixes needed."
        improvements:
          - area: "Lint violations"
            suggestion: "Fix the 3 linting violations identified in the lint output."
            severity: important

  - node: impl_loop.refactor
    output:
      response_text: "Fixed all 3 linting violations. Code style now matches project conventions."

  # Iteration 1 — lint passes, review passes
  - node: impl_loop.implement
    output:
      response_text: "Built on refactored code. Lint clean."

  - node: impl_loop.lint
    output:
      exit_code: 0

  - node: impl_loop.code_review
    output:
      response:
        grade: pass
        summary: "Lint passes. Code looks good."
        suggestions: []

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "Lint passes, review approved. All good."
        improvements: []

expect:
  outcome: completed
  reached:
    - planning
    - impl_loop
    - impl_loop.implement
    - impl_loop.lint
    - impl_loop.join_checks
    - impl_loop.code_review
    - impl_loop.evaluate
    - impl_loop.refactor
    - success
  not_reached:
    - planning.plan
    - write_tests
    - start_app
    - impl_loop.test
    - impl_loop.build
