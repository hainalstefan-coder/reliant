# Code Review Retry: Review fails, evaluate says improve, refactor fixes, second attempt passes
#
# Tests the full evaluate → refactor loop triggered by a failing code review:
# 1. Iteration 0: implement runs, review grades 'fail', evaluate says 'improve', refactor applies fixes
# 2. Loop condition: eval_strategy != "proceed" → re-iterate
# 3. Iteration 1: implement builds on refactored code, review passes, evaluate says 'proceed'
# 4. Refactor skipped, loop exits
#
# Verifies that a failing review flows through evaluate → refactor → retry.

name: code_review_fails_then_passes
description: Code review fails, evaluate triggers refactor, passes on retry

inputs:
  steps: [implement, code_review, evaluate, refactor]

events:
  # Iteration 0 — review fails, evaluate says improve, refactor fixes
  - node: impl_loop.implement
    output:
      response_text: "Initial implementation attempt."

  - node: impl_loop.code_review
    output:
      response:
        grade: fail
        summary: "Implementation has critical issues."
        suggestions:
          - "Fix null pointer in handler"
          - "Add input validation"

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "Code review found null pointer and missing validation. These are specific fixable issues."
        improvements:
          - area: "Handler null safety"
            suggestion: "Add null check before accessing request.body in the handler."
            severity: critical
          - area: "Input validation"
            suggestion: "Add validation middleware for the incoming request payload."
            severity: important

  - node: impl_loop.refactor
    output:
      response_text: "Added null check in handler and input validation middleware. Both issues from the review are resolved."

  # Iteration 1 — review passes, evaluate says proceed
  - node: impl_loop.implement
    output:
      response_text: "Built on refactored code. All review issues resolved."

  - node: impl_loop.code_review
    output:
      response:
        grade: pass
        summary: "All issues resolved. Implementation looks good."
        suggestions: []

  - node: impl_loop.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "Code review passed. Implementation is clean and complete."
        improvements: []

  # refactor skipped (evaluate strategy == "proceed")

expect:
  outcome: completed
  reached:
    - planning
    - impl_loop
    - impl_loop.implement
    - impl_loop.join_checks
    - impl_loop.code_review
    - impl_loop.evaluate
    - impl_loop.refactor
    - success
  not_reached:
    - planning.plan
    - write_tests
    - start_app
    - impl_loop.lint
    - impl_loop.test
    - impl_loop.build
