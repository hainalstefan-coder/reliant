# Compaction Triggered: Large tool output triggers context compaction
#
# Tests the compaction path:
# 1. main_agent makes a tool call
# 2. audit_check approves
# 3. execute_tools runs the tool, returns high thread_token_count
# 4. Compact node runs because thread_token_count > compaction_threshold
# 5. Next iteration continues normally after compaction
#
# The edge from execute_tools to compact fires when:
#   nodes.execute_tools.thread_token_count > inputs.compaction_threshold
#
# We set compaction_threshold to 10000 and return thread_token_count of 15000
# to trigger compaction.

name: compaction_triggered
description: Tool output pushes token count over threshold, compact node runs

inputs:
  compaction_threshold: 10000  # Low threshold for testing

events:
  # Iteration 1: main_agent requests a tool
  - node: audited_loop.main_agent
    type: llm_response
    text: "Let me read that large file."
    tool_calls:
      - name: view
        input:
          file_path: "/path/to/large_file.go"

  # audit_check approves
  - node: audited_loop.audit_check
    type: llm_response
    text: ""
    tool_calls:
      - name: audit
        input:
          approved: true
          guidance: ""

  # execute_audit confirms approval
  - node: audited_loop.execute_audit
    type: tool_result
    tool: audit
    output:
      approved: true
      guidance: ""

  # execute_tools returns large result, token count exceeds threshold
  - node: audited_loop.execute_tools
    type: tool_result
    tool: view
    output:
      result: "Very long file content that causes context to grow..."
      thread_token_count: 15000  # Exceeds 10000 threshold

  # compact runs because 15000 > 10000
  - node: audited_loop.compact
    type: tool_result
    tool: compact
    output:
      compacted: true
      original_tokens: 15000
      compacted_tokens: 8000

  # Iteration 2: main_agent responds with final answer
  - node: audited_loop.main_agent
    type: llm_response
    text: "The file contains Go code."

  # audit_check approves final response
  - node: audited_loop.audit_check
    type: llm_response
    text: ""
    tool_calls:
      - name: audit
        input:
          approved: true
          guidance: ""

  # execute_audit confirms approval
  - node: audited_loop.execute_audit
    type: tool_result
    tool: audit
    output:
      approved: true
      guidance: ""

expect:
  outcome: completed
  reached:
    - audited_loop
    - audited_loop.main_agent
    - audited_loop.audit_check
    - audited_loop.execute_audit
    - audited_loop.save_approved_response
    - audited_loop.execute_tools
    - audited_loop.compact  # Compaction should run
