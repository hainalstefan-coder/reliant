# Tool Calls Approved: Agent makes tool calls, auditor approves, tools execute
#
# Tests the tool execution path:
# 1. main_agent responds with a tool call
# 2. audit_check approves via the audit response tool
# 3. execute_audit confirms approval
# 4. save_approved_response saves agent message to thread
# 5. execute_tools runs the agent's tool call
# 6. Loop continues (tool_calls was non-empty)
# 7. main_agent responds with text only on second iteration
# 8. audit_check approves again
# 9. Loop exits because tool_calls is now empty
#
# This verifies the full audit-approve-execute cycle works end-to-end.

name: tool_calls_approved
description: Agent makes tool calls, auditor approves, tools execute, then agent finishes

events:
  # Iteration 1: main_agent requests a tool
  - node: audited_loop.main_agent
    type: llm_response
    text: "Let me read that file for you."
    tool_calls:
      - name: view
        input:
          file_path: "/path/to/file.go"

  # audit_check approves
  - node: audited_loop.audit_check
    type: llm_response
    text: ""
    tool_calls:
      - name: audit
        input:
          approved: true
          guidance: ""

  # execute_audit confirms approval
  - node: audited_loop.execute_audit
    type: tool_result
    tool: audit
    output:
      approved: true
      guidance: ""

  # execute_tools runs the view tool
  - node: audited_loop.execute_tools
    type: tool_result
    tool: view
    output:
      result: "package main\n\nfunc main() {}"

  # Iteration 2: main_agent responds with final answer (no tools)
  - node: audited_loop.main_agent
    type: llm_response
    text: "The file contains a simple Go main package."

  # audit_check approves final response
  - node: audited_loop.audit_check
    type: llm_response
    text: ""
    tool_calls:
      - name: audit
        input:
          approved: true
          guidance: ""

  # execute_audit confirms approval
  - node: audited_loop.execute_audit
    type: tool_result
    tool: audit
    output:
      approved: true
      guidance: ""

expect:
  outcome: completed
  reached:
    - audited_loop
    - audited_loop.main_agent
    - audited_loop.audit_check
    - audited_loop.execute_audit
    - audited_loop.save_approved_response
    - audited_loop.execute_tools
  not_reached:
    - audited_loop.compact
