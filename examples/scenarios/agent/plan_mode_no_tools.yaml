# Plan Mode No Tools: LLM responds with plan text, no tool calls
#
# Tests the plan mode path where the LLM provides a plan without
# needing to use any tools at all:
# 1. LLM is called with the planning system prompt active
# 2. LLM responds with just text (a plan), no tool calls
# 3. Loop exits immediately
#
# This is distinct from plan_mode.yaml which exercises read-only tools.
# Here the LLM already knows enough to produce a plan from the
# conversation context alone.

name: plan_mode_no_tools
description: Plan mode, LLM responds with plan text without calling any tools

inputs:
  mode: "plan"

events:
  # LLM responds with a plan directly, no tools needed
  - node: agent_loop.call_llm
    type: llm_response
    text: |
      Here's my plan based on what you've described:
      
      1. Create the database migration for the users table
      2. Add the User model with validation
      3. Implement CRUD endpoints in the handler
      4. Write integration tests
      
      Switch to Auto or Manual mode to begin implementation.

expect:
  outcome: completed
  reached:
    - agent_loop
    - agent_loop.call_llm
  not_reached:
    # No tools called at all
    - agent_loop.approval
    - agent_loop.execute_tools
    - agent_loop.compact
    - max_turns_notification
