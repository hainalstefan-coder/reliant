# Manual Mode Approved: User approves tool execution
#
# Tests the manual approval flow in structured-agent:
# 1. LLM calls a regular tool (mode=manual triggers approval gate)
# 2. Approval node fires, user approves
# 3. Tool executes after approval
# 4. LLM calls the response tool
# 5. Approval node fires again for the response tool
# 6. User approves, response tool executes
# 7. Loop exits with completed = true
#
# Key difference from auto mode: every tool call goes through approval,
# including the response tool itself.

name: manual_mode_approved
description: Manual mode requires approval before tool execution; user approves all

inputs:
  mode: "manual"
  response_tool_name: "submit_response"

events:
  # Iteration 1: LLM wants to read a file
  - node: agent_loop.call_llm
    type: llm_response
    text: "Let me read the file."
    tool_calls:
      - name: view
        input:
          file_path: "main.go"

  # Manual mode: approval is required
  - node: agent_loop.approval
    type: tool_result
    tool: approval
    output:
      status: "approved"

  # Tool executes after approval
  - node: agent_loop.execute_tools
    type: tool_result
    tool: view
    output:
      result: "package main\n\nfunc main() {}"

  # Iteration 2: LLM submits structured response
  - node: agent_loop.call_llm
    type: llm_response
    text: "Found a Go file."
    tool_calls:
      - name: submit_response
        input:
          choice: "complete"
          value: "File contains a Go main package."

  # Response tool also needs approval in manual mode
  - node: agent_loop.approval
    type: tool_result
    tool: approval
    output:
      status: "approved"

  # Response tool executes
  - node: agent_loop.execute_tools
    type: tool_result
    tool: submit_response
    output:
      choice: "complete"
      value: "File contains a Go main package."

expect:
  outcome: completed
  reached:
    - agent_loop
    - agent_loop.call_llm
    - agent_loop.approval       # Approval gate reached (twice)
    - agent_loop.execute_tools
  not_reached:
    - agent_loop.remind_response
    - agent_loop.compact

  outputs:
    response.choice: "complete"
    response.value: "File contains a Go main package."
    completed: true
