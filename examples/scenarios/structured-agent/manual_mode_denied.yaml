# Manual Mode Denied: User denies a tool call, agent recovers
#
# Tests the denial path in manual mode:
# 1. LLM calls a dangerous tool (e.g., rm -rf)
# 2. Approval node fires, user DENIES
# 3. execute_tools is NOT reached (denied edge has no target)
# 4. Loop continues because completed is still false
# 5. LLM adjusts and calls the response tool instead
# 6. User approves the response tool
# 7. Loop exits with completed = true
#
# This verifies:
# - Denied approval skips tool execution
# - The loop continues after denial (doesn't crash or halt)
# - The agent can recover and still complete via the response tool

name: manual_mode_denied
description: User denies a dangerous tool call; agent recovers and submits response

inputs:
  mode: "manual"
  response_tool_name: "submit_response"

events:
  # Iteration 1: LLM tries a risky operation
  - node: agent_loop.call_llm
    type: llm_response
    text: "I'm going to delete the file."
    tool_calls:
      - name: bash
        input:
          command: "rm -rf /important"

  # User denies the dangerous operation
  - node: agent_loop.approval
    type: tool_result
    tool: approval
    output:
      status: "denied"

  # execute_tools is NOT reached for denied approval
  # Loop continues because completed != true

  # Iteration 2: LLM submits response tool instead
  - node: agent_loop.call_llm
    type: llm_response
    text: "I'll submit my response instead."
    tool_calls:
      - name: submit_response
        input:
          choice: "complete"
          value: "Task completed without file deletion as requested."

  # User approves the response tool
  - node: agent_loop.approval
    type: tool_result
    tool: approval
    output:
      status: "approved"

  # Response tool executes
  - node: agent_loop.execute_tools
    type: tool_result
    tool: submit_response
    output:
      choice: "complete"
      value: "Task completed without file deletion as requested."

expect:
  outcome: completed
  reached:
    - agent_loop
    - agent_loop.call_llm
    - agent_loop.approval       # Approval reached (denied first, approved second)
    - agent_loop.execute_tools  # Only reached for the approved response tool
  not_reached:
    - agent_loop.remind_response
    - agent_loop.compact

  outputs:
    response.choice: "complete"
    response.value: "Task completed without file deletion as requested."
    completed: true
