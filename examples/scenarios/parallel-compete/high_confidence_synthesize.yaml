# High Confidence Synthesize: Detailed synthesis combining auth system components
#
# Tests a high-confidence synthesize decision with specific, detailed
# synthesis instructions. This exercises the full synthesize path where
# the reviewer provides comprehensive merging guidance.
#
# Key aspects tested:
# - Synthesize condition routes to synthesizer (not apply_winner)
# - Winner field indicates the base implementation
# - Synthesis instructions provide detailed merge guidance
# - Synthesizer agent (black-box workflow) produces a final result
# - High confidence value (10/10) is passed through correctly

name: high_confidence_synthesize
description: Reviewer has high confidence in synthesis approach with detailed merge instructions

events:
  # Prompt improvement
  - node: improve_prompt
    output:
      message:
        role: assistant
        text: "Build a comprehensive authentication system with OAuth, password auth, and JWT"
      response_text: "Build a comprehensive authentication system with OAuth, password auth, and JWT"
      tool_calls: []

  # Create worktrees
  - node: create_worktree_1
    output:
      id: "wt1"
      name: "b1"
      path: "/wt/1"
      branch: "b1"
      base_branch: "main"
      repo_id: "test"
      status: "created"
  - node: create_worktree_2
    output:
      id: "wt2"
      name: "b2"
      path: "/wt/2"
      branch: "b2"
      base_branch: "main"
      repo_id: "test"
      status: "created"
  - node: create_worktree_3
    output:
      id: "wt3"
      name: "b3"
      path: "/wt/3"
      branch: "b3"
      base_branch: "main"
      repo_id: "test"
      status: "created"

  # Each implementation specializes in one area
  - node: impl_1
    output:
      message:
        role: assistant
        text: "OAuth provider integration complete with Google, GitHub, and Apple support"
      response_text: "OAuth provider integration complete with Google, GitHub, and Apple support"

  - node: impl_2
    output:
      message:
        role: assistant
        text: "Password auth with bcrypt hashing, rate limiting, and account lockout"
      response_text: "Password auth with bcrypt hashing, rate limiting, and account lockout"

  - node: impl_3
    output:
      message:
        role: assistant
        text: "JWT token generation, validation, refresh flow, and session management"
      response_text: "JWT token generation, validation, refresh flow, and session management"

  # High confidence synthesis decision
  - node: review
    output:
      message:
        role: assistant
        text: "Each candidate excels at a different auth component. Combining all three creates a complete auth system."
      response_text: "Each candidate excels at a different auth component. Combining all three creates a complete auth system."
      response:
        winner: 2
        strategy: "synthesize"
        confidence: 10
        rationale: "Candidate 1 has the best OAuth integration, Candidate 2 has the best password handling with security features, Candidate 3 has the best JWT management. Together they form a complete auth system."
        synthesis_instructions: |
          1. Start with Candidate 2's password auth as the base (most complete project structure)
          2. Integrate Candidate 1's OAuth provider setup from /wt/1/auth/oauth.go
          3. Add Candidate 3's JWT token generation and validation from /wt/3/auth/jwt.go
          4. Ensure all auth methods use consistent user session handling
          5. Merge test files from all three candidates
      completed: true

  # Synthesizer combines the implementations
  - node: synthesizer
    output:
      message:
        role: assistant
        text: "Successfully combined OAuth, password auth, and JWT into a unified auth system with full test coverage"
      response_text: "Successfully combined OAuth, password auth, and JWT into a unified auth system with full test coverage"

expect:
  outcome: completed
  reached:
    - improve_prompt
    - save_improved_prompt
    - create_worktree_1
    - create_worktree_2
    - create_worktree_3
    - impl_1
    - impl_2
    - impl_3
    - review
    - synthesizer
    - complete
  not_reached:
    - apply_winner
