# Max Retries Exhausted: Loop exits after hitting the retry limit
#
# Tests the loop's max_retries safeguard with the full implement → evaluate → refactor cycle:
# 1. Iteration 0: implement fails, evaluate says "restart", refactor scraps and restructures
# 2. Iteration 1: implement tries again, evaluate says "improve", refactor applies fixes
# 3. Loop condition: iter.iteration(2) == max_retries(2) → loop exits despite not proceeding
# 4. Final diagnose synthesizes all learnings, final implement does best-effort
#
# Verifies that:
# - The loop correctly stops at max_retries even when strategy != "proceed"
# - Both "restart" and "improve" strategies trigger refactor before re-iterating
# - The workflow still completes through diagnose → implement

name: max_retries_exhausted
description: All retries fail, loop exits at max_retries limit

inputs:
  max_retries: 2

events:
  # Iteration 0: fundamentally wrong, restart
  - node: attempt.implement
    output:
      response_text: "First attempt. Tried to refactor the auth module but broke session handling."

  - node: attempt.evaluate
    output:
      response:
        strategy: "restart"
        diagnosis: "Auth module is tightly coupled to session management. Can't change one without the other. This approach is swimming upstream."
        difficulty_areas: "Session state is shared across auth middleware, route handlers, and websocket connections."
        wrong_abstractions: "Assumed auth and sessions were independent modules — they're deeply intertwined."
        improvements:
          - area: "Architecture"
            suggestion: "Introduce an event bus to decouple auth, sessions, and websockets before attempting any refactoring."
            severity: critical
          - area: "Approach"
            suggestion: "Start from the middleware layer rather than the module boundaries."
            severity: critical

  - node: attempt.refactor
    output:
      response_text: "Reverted auth module changes. Introduced a basic event bus for state changes between auth and sessions. Restructured the approach to start from the middleware layer."

  # Iteration 1: better but still not there
  - node: attempt.implement
    output:
      response_text: "Second attempt. Event bus approach works for auth/sessions but the websocket layer also has coupling issues."

  - node: attempt.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "The event bus approach is right but incomplete. Websockets maintain their own auth state that also needs to go through the bus."
        difficulty_areas: "Three-way coupling between auth, sessions, and websockets. Each depends on the others' internal state."
        wrong_abstractions: "Even the combined auth+session refactor isn't enough — websockets maintain their own auth state."
        improvements:
          - area: "Websocket auth"
            suggestion: "Websocket connections need to subscribe to auth state changes via the event bus rather than caching auth state internally."
            severity: critical
          - area: "Event bus scope"
            suggestion: "Extend the event bus to cover all three systems: auth, sessions, and websocket connection state."
            severity: important

  - node: attempt.refactor
    output:
      response_text: "Extended event bus to cover websocket auth state. Websocket connections now subscribe to auth changes instead of caching. Still need to verify all edge cases around reconnection."

  # Loop exits: iter.iteration(2) == max_retries(2)

  - node: diagnose
    output:
      response_text: "After 2 attempts, the core problem is clear: auth, sessions, and websockets form a tightly coupled triad. The event bus approach is correct but needs to cover all three systems. Start the final implementation from scratch with the full event bus architecture."

  - node: implement
    output:
      response_text: "Implemented complete event bus pattern from scratch covering auth, sessions, and websockets. Each module subscribes to state change events instead of directly referencing others."

expect:
  outcome: completed
  reached:
    - attempt
    - attempt.implement
    - attempt.evaluate
    - attempt.refactor
    - diagnose
    - implement
  node_outputs:
    attempt:
      strategy: "improve"
      diagnosis: "The event bus approach is right but incomplete. Websockets maintain their own auth state that also needs to go through the bus."
