# Happy Path: First attempt succeeds immediately
#
# Tests the simplest successful path:
# 1. Iteration 0: implement runs, evaluate says strategy="proceed"
# 2. Conditional edge: strategy == "proceed" → skip refactor
# 3. Loop condition: strategy == "proceed" → loop exits after 1 iteration
# 4. Final diagnose synthesizes learnings, final implement applies solution
#
# Verifies the loop correctly exits when the first attempt needs no refactoring,
# and the conditional edge skips the refactor node.

name: happy_path_no_retry
description: First attempt succeeds, no refactoring needed

events:
  - node: attempt.implement
    output:
      response_text: "Implemented the feature. Tests pass, code looks correct."

  - node: attempt.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "Implementation is correct. The codebase patterns were straightforward."
        difficulty_areas: "None — the existing abstractions mapped cleanly to the task."
        wrong_abstractions: "None — initial assumptions were accurate."
        improvements: []

  # refactor is skipped (conditional edge: strategy == "proceed")

  - node: diagnose
    output:
      response_text: "The implementation succeeded on the first attempt. Key insight: the codebase follows clean separation of concerns, making the change straightforward."

  - node: implement
    output:
      response_text: "Final implementation complete. Applied the same approach from the successful first attempt."

expect:
  outcome: completed
  reached:
    - attempt
    - attempt.implement
    - attempt.evaluate
    - diagnose
    - implement
  not_reached:
    - attempt.refactor
  node_outputs:
    attempt:
      strategy: "proceed"
      diagnosis: "Implementation is correct. The codebase patterns were straightforward."
