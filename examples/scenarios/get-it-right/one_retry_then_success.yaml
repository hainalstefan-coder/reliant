# One Retry Then Success: First attempt has issues, refactor fixes them, second succeeds
#
# Tests the implement → evaluate → refactor → loop cycle:
# 1. Iteration 0: implement runs, evaluate says strategy="improve" with improvements
# 2. Refactor agent applies the improvements
# 3. Loop condition: strategy != "proceed" → re-iterate
# 4. Iteration 1: implement builds on refactored code, evaluate says strategy="proceed"
# 5. Conditional edge: strategy == "proceed" → skip refactor
# 6. Loop exits, final diagnose and implement complete
#
# Verifies the three-agent loop works: implement → evaluate → refactor → implement

name: one_retry_then_success
description: First attempt has issues, refactor agent fixes them, second attempt succeeds

events:
  # Iteration 0: implement has issues
  - node: attempt.implement
    output:
      response_text: "Attempted the feature but tests fail. The data model doesn't match expectations."

  - node: attempt.evaluate
    output:
      response:
        strategy: "improve"
        diagnosis: "The implementation assumed a flat data model but the schema is actually nested with foreign key constraints."
        difficulty_areas: "Database schema is more complex than it appears from the API layer."
        wrong_abstractions: "Assumed direct table access but there's a repository pattern wrapping queries."
        improvements:
          - area: "Data access layer"
            suggestion: "Use the repository layer instead of direct SQL. Follow the existing pattern in UserRepository."
            severity: critical
          - area: "Schema assumptions"
            suggestion: "Check the migration files for the actual schema shape before writing queries."
            severity: important

  - node: attempt.refactor
    output:
      response_text: "Refactored data access to use the repository layer. Replaced direct SQL queries with UserRepository methods. Updated schema assumptions based on migration files. Tests now pass for the data layer."

  # Iteration 1: implement builds on refactored code, succeeds
  - node: attempt.implement
    output:
      response_text: "Built on the refactored repository layer. All tests pass, implementation is clean."

  - node: attempt.evaluate
    output:
      response:
        strategy: "proceed"
        diagnosis: "Implementation is now correct. The repository layer integration is solid and follows codebase conventions."
        difficulty_areas: "The repository pattern was non-obvious from the surface API."
        wrong_abstractions: "First attempt bypassed the repository layer — now corrected by the refactor."
        improvements: []

  # refactor is skipped (conditional edge: strategy == "proceed")

  # Final phases
  - node: diagnose
    output:
      response_text: "Key learning: always use the repository layer for data access. The schema has hidden complexity behind FK constraints that the repository handles correctly."

  - node: implement
    output:
      response_text: "Final implementation uses the repository pattern throughout. All tests pass. Migration script included."

expect:
  outcome: completed
  reached:
    - attempt
    - attempt.implement
    - attempt.evaluate
    - attempt.refactor
    - diagnose
    - implement
  node_outputs:
    attempt:
      strategy: "proceed"
      diagnosis: "Implementation is now correct. The repository layer integration is solid and follows codebase conventions."
