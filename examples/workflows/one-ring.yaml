name: one-ring
apiVersion: "0.0.5"
description: |
  Unified development pipeline: planning → write_tests → start_app → [implement → lint/test/build → code_review → evaluate → refactor?] (loop) → complete.

  Planning runs in a sub-workflow fork with optional research/criticize/revise steps.
  Only the final plan summary is saved to the main thread.

  The implementation loop runs implement → checks → code_review → evaluate → refactor:
    - implement: build the requested changes
    - lint/test/build: parallel automated checks
    - code_review: structured review with pass/fail grade
    - evaluate: structured assessment that decides strategy (proceed/improve/restart)
    - refactor: (conditional) applies the evaluation's improvements before next attempt

  The loop repeats when the evaluate strategy is not "proceed", up to max_retries.
  When evaluate says "proceed", refactor is skipped and the loop exits.
  Iterations accumulate on the main thread so agents see previous feedback.

  Thread architecture:
    Main thread: [user msg] → [final plan] → [test summary] → [impl summary] → [check results] → [review] → [evaluation] → [refactor summary?] → ...
    Planning fork: [user msg] → [research?] → [plan conversation] → [criticize?] → [revise?]  (discarded after plan saved)
    Each agent fork: [parent context snapshot] → [agent conversation]  (only summary saved back)

entry: [planning]

inputs:
  mode:
    type: enum
    ui: toolbar
    default: auto
    description: Execution mode for agent steps.
    enum: [manual, auto, plan]

  model:
    type: model
    description: Model used for all LLM sub-agents in this pipeline
    default:
      tags: [flagship]

  steps:
    type: enum
    ui: toolbar
    default: [plan, implement, evaluate, code_review]
    description: Steps to include in the pipeline.
    multi: true
    enum:
      - research    # Research phase before planning
      - plan
      - criticize   # Critique the plan
      - revise      # Revise the plan based on critique
      - tdd         # Enables write_tests
      - implement
      - lint
      - test
      - build
      - start_app   # Start dev server before impl loop (enables UX sub-review)
      - code_review
      - evaluate    # Post-implementation evaluation with strategy decision
      - refactor    # Conditional refactoring based on evaluation

  yield:
    type: boolean
    ui: toolbar
    default: true
    description: Pause for user review after plan and implement steps.

  max_retries:
    type: integer
    default: 3
    min: 1
    max: 10
    description: Maximum implementation loop iterations before giving up.

  lint_command:
    type: string
    default: npm run lint
    description: Command to run linting.

  lint_log:
    type: string
    default: ./data/one-ring/lint.log
    description: File path for lint output.

  test_command:
    type: string
    default: npm test
    description: Command to run tests.

  test_log:
    type: string
    default: ./data/one-ring/test.log
    description: File path for test output.

  build_command:
    type: string
    default: npm run build
    description: Command to run builds.

  build_log:
    type: string
    default: ./data/one-ring/build.log
    description: File path for build output.

  start_app_command:
    type: string
    default: npm run dev
    description: Command to start the application for UX review.

  app_port:
    type: integer
    default: 5173
    description: Port the application runs on (for UX reviewer to connect to).

# Thread design:
# - Planning forks from main thread (gets user msg). Each sub-step forks again.
#   Only the final plan is saved to main. Research/criticism stays in forks.
# - write_tests forks from main: sees only [user msg, final plan]. Clean.
# - impl_loop is passthrough (loops always inherit parent thread): iterations accumulate so implement sees previous feedback.
# - implement, code_review, evaluate, and refactor fork within the loop:
#   agent conversations stay isolated, only summaries written back to main thread.
# - On iteration 1+, the main thread already has iter 0's summaries, review feedback,
#   evaluation, and refactoring summary, so the next implement sees the full context.

nodes:
  # ── Planning phase (sub-workflow, runs once) ────────────────────────────────
  #
  # Forks from main thread. Inner nodes each fork again (double fork).
  # Only the plan summary is saved to the main thread.
  # Supports optional research → plan → criticize → revise pipeline.

  - id: planning
    type: workflow
    thread:
      mode: fork
      memo: false
    inline:
      entry: [research]

      outputs:
        plan_summary: >
          {{has(nodes.revise) && has(nodes.revise.response_text)
            ? nodes.revise.response_text
            : has(nodes.plan) && has(nodes.plan.response_text)
              ? nodes.plan.response_text
              : ''}}

      nodes:
        - id: research
          type: workflow
          condition: "'research' in inputs.steps"
          ref: builtin://agent
          presets:
            default: researcher
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Research
                Gather context, constraints, and relevant information before planning.
                Explore the codebase, read documentation, and identify key patterns.
          save_message:
            role: assistant
            content: |
              ## Research Findings
              {{output.response_text}}

        - id: plan
          type: workflow
          condition: "'plan' in inputs.steps"
          ref: builtin://agent
          presets:
            default: planner
          args:
            model: "{{inputs.model}}"
            yield: "{{inputs.yield}}"
            mode: "{{inputs.mode}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Plan
                Produce a concise, actionable plan aligned with the task.

                **Spawn researchers** to investigate the codebase before planning. Delegate all investigation
                to researcher agents — they use cheaper models and free you to focus on synthesis.

                Structure the plan to maximize parallelization — group independent tasks that can run
                concurrently and explicitly call out dependencies between tasks.
          save_message:
            role: assistant
            content: |
              ## Plan
              {{output.response_text}}

        - id: criticize
          type: workflow
          condition: "'criticize' in inputs.steps"
          ref: builtin://agent
          presets:
            default: planner
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Criticize
                Critique the current plan. Identify risks, gaps, overcomplications, and potential issues.
                Be specific — point to concrete problems, not vague concerns.
          save_message:
            role: assistant
            content: |
              ## Plan Critique
              {{output.response_text}}

        - id: revise
          type: workflow
          condition: "'revise' in inputs.steps"
          ref: builtin://agent
          presets:
            default: planner
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Revise
                Revise the plan based on the critique. Address the identified risks and gaps.
                Produce a final, improved plan.
          save_message:
            role: assistant
            content: |
              ## Revised Plan
              {{output.response_text}}

      edges:
        - from: research
          default: plan
        - from: plan
          default: criticize
        - from: criticize
          default: revise
      ui:
        positions:
          workflow:
            x: 50
            y: 200
          research:
            x: 400
            y: 200
          plan:
            x: 750
            y: 200
          criticize:
            x: 1100
            y: 200
          revise:
            x: 1450
            y: 200

    save_message:
      role: assistant
      content: >-
        {{output.plan_summary != '' ? '## Final Plan\n' + output.plan_summary : ''}}

  # ── TDD (runs once, clean context) ─────────────────────────────────────────
  #
  # Forks from main thread which at this point has: [user msg, final plan].
  # No research details, no criticism — just what the test writer needs.

  - id: write_tests
    type: workflow
    condition: "'tdd' in inputs.steps"
    ref: builtin://agent
    presets:
      default: tester
    args:
      model: "{{inputs.model}}"
      mode: "{{inputs.mode}}"
    thread:
      mode: fork
      memo: false
      inject:
        role: user
        content: |
          ## Pipeline Step: Write Tests (TDD)
          Write failing tests for the planned functionality before implementation.
          Focus on:
          - Unit tests for the core logic
          - Edge cases and error conditions
          - Integration points if applicable
          
          The tests should fail initially — they will pass after implementation.
    save_message:
      role: assistant
      content: |
        ## Test Suite Created
        {{output.response_text}}

  # Start the dev server before the impl loop so it persists across iterations.
  - id: start_app
    type: run
    condition: "'start_app' in inputs.steps"
    command: "{{inputs.start_app_command}} &"

  # ── Implementation loop (implement → checks → review → evaluate → refactor) ─
  #
  # Inherits main thread: iterations accumulate so the implement agent on iteration N+1
  # sees the evaluation feedback and refactoring summary from iteration N.
  #
  # Each iteration:
  #   1. stash_failed: git stash any changes from prior failed iteration (iter 1+)
  #   2. implement: implementation agent
  #   3. lint/test/build: parallel checks
  #   4. code_review: structured code review with pass/fail
  #   5. evaluate: structured assessment — proceed, improve, or restart?
  #   6. refactor: (conditional) apply improvements before next iteration
  #
  # Main thread at loop entry: [user msg, final plan, test summary]
  # After iteration 0: + [impl summary, check results, review, evaluation, refactor summary?]
  # After iteration 1: + [impl summary, check results, review, evaluation, refactor summary?] → loop exits

  - id: impl_loop
    type: loop
    while: >
      has(outputs.eval_strategy) && outputs.eval_strategy != "proceed"
      && iter.iteration < inputs.max_retries
    inline:
      entry: [stash_failed]

      outputs:
        lint_exit: "{{has(nodes.lint) && has(nodes.lint.exit_code) ? nodes.lint.exit_code : 0}}"
        test_exit: "{{has(nodes.test) && has(nodes.test.exit_code) ? nodes.test.exit_code : 0}}"
        build_exit: "{{has(nodes.build) && has(nodes.build.exit_code) ? nodes.build.exit_code : 0}}"
        review_grade: "{{has(nodes.code_review) && has(nodes.code_review.response) && nodes.code_review.response != null ? nodes.code_review.response.grade : 'pass'}}"
        eval_strategy: >
          {{has(nodes.evaluate) && has(nodes.evaluate.response) && nodes.evaluate.response != null
            ? nodes.evaluate.response.strategy
            : (
                (has(nodes.lint) && has(nodes.lint.exit_code) && nodes.lint.exit_code != 0) ||
                (has(nodes.test) && has(nodes.test.exit_code) && nodes.test.exit_code != 0) ||
                (has(nodes.build) && has(nodes.build.exit_code) && nodes.build.exit_code != 0) ||
                (has(nodes.code_review) && has(nodes.code_review.response) && nodes.code_review.response != null && nodes.code_review.response.grade == 'fail')
              ) ? 'improve' : 'proceed'}}

      nodes:
        # Git stash any changes from the prior failed iteration.
        # On iteration 0 this is a no-op (nothing to stash).
        - id: stash_failed
          type: run
          command: "git stash push --include-untracked -m 'one-ring-iter-{{iter.iteration}}' 2>/dev/null || true"

        - id: implement
          type: workflow
          condition: "'implement' in inputs.steps"
          ref: builtin://agent
          presets:
            default: general
          args:
            model: "{{inputs.model}}"
            yield: "{{inputs.yield}}"
            mode: "{{inputs.mode}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Implement (Attempt {{iter.iteration + 1}})
                {{iter.iteration == 0 ? 'Implement the required changes. Use tools to edit code and verify results.\n\nParallelize your work: if the plan identifies independent tasks, use spawn to work on\nmultiple files or modules simultaneously rather than sequentially.' : 'Previous attempt was evaluated and refactored above. Read the evaluation and refactoring summary carefully before continuing. Build on the refactored code — do not redo work that has already been improved.'}}
          save_message:
            role: assistant
            content: |
              ## Implementation Summary (Attempt {{iter.iteration + 1}})
              {{output.response_text}}

        - id: lint
          type: run
          condition: "'lint' in inputs.steps"
          command: "{{inputs.lint_command}} > {{inputs.lint_log}} 2>&1"
          save_message:
            role: assistant
            content: "Lint: {{output.exit_code == 0 ? 'passed' : 'failed (exit ' + string(output.exit_code) + ')'}}"

        - id: test
          type: run
          condition: "'test' in inputs.steps"
          command: "{{inputs.test_command}} > {{inputs.test_log}} 2>&1"
          save_message:
            role: assistant
            content: "Test: {{output.exit_code == 0 ? 'passed' : 'failed (exit ' + string(output.exit_code) + ')'}}"

        - id: build
          type: run
          condition: "'build' in inputs.steps"
          command: "{{inputs.build_command}} > {{inputs.build_log}} 2>&1"
          save_message:
            role: assistant
            content: "Build: {{output.exit_code == 0 ? 'passed' : 'failed (exit ' + string(output.exit_code) + ')'}}"

        - id: join_checks
          type: join

        - id: code_review
          type: workflow
          condition: "'code_review' in inputs.steps"
          ref: builtin://structured-agent
          presets:
            default: code_reviewer
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
            response_tool_name: submit_review
            response_tool_description: "Submit your code review with a pass/fail grade and suggestions"
            response_schema:
              type: object
              required: [grade, summary]
              properties:
                grade:
                  type: string
                  enum: [pass, fail]
                  description: "Overall grade for the implementation"
                summary:
                  type: string
                  description: "Brief summary of the review findings"
                suggestions:
                  type: array
                  items:
                    type: string
                  description: "List of suggestions for improvement"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Code Review
                Review all changes made during implementation. Spawn your sub-reviewers in parallel.
                
                Check status:
                - Lint: {{has(nodes.lint) && has(nodes.lint.exit_code) ? (nodes.lint.exit_code == 0 ? 'passed' : 'failed') : 'skipped'}}
                - Test: {{has(nodes.test) && has(nodes.test.exit_code) ? (nodes.test.exit_code == 0 ? 'passed' : 'failed') : 'skipped'}}
                - Build: {{has(nodes.build) && has(nodes.build.exit_code) ? (nodes.build.exit_code == 0 ? 'passed' : 'failed') : 'skipped'}}
                
                {{'start_app' in inputs.steps ? 'The application is running at: http://localhost:' + string(inputs.app_port) + ' — spawn the ux_reviewer to audit it via Chrome DevTools.' : ''}}
                
                Analyze the implementation quality and submit your review with a grade (pass/fail) and suggestions.
          save_message:
            role: assistant
            content: |
              ## Code Review: {{output.response.grade}}
              
              {{output.response.summary}}
              
              {{has(output.response.suggestions) && output.response.suggestions != null && size(output.response.suggestions) > 0 ? '### Suggestions\n' + output.response.suggestions.map(s, '- ' + s).join('\n') : ''}}

        # ── Evaluate (post-implementation assessment) ──────────────────────────
        #
        # Structured agent that reviews everything — implementation, check results,
        # code review — and decides the strategy for the next iteration.
        # This is the get-it-right pattern: evaluate what happened, decide whether
        # to improve, restart, or proceed.

        - id: evaluate
          type: workflow
          condition: "'evaluate' in inputs.steps"
          ref: builtin://structured-agent
          args:
            model: "{{inputs.model}}"
            mode: auto
            response_tool_name: submit_evaluation
            response_tool_description: "Submit your evaluation of the implementation attempt and recommended strategy"
            response_schema:
              type: object
              required: [strategy, diagnosis, improvements]
              properties:
                strategy:
                  type: string
                  enum: ["improve", "restart", "proceed"]
                  description: |
                    "proceed" — implementation is correct, checks pass, code review approved. Break the loop.
                    "restart" — the approach is fundamentally wrong; the refactor agent should scrap it and start fresh. Prefer this when the code fights the codebase's patterns.
                    "improve" — the approach is sound but has specific fixable issues for the refactor agent.
                diagnosis:
                  type: string
                  description: "Complete analysis — what worked, what didn't, and why. Include check failures and review feedback."
                improvements:
                  type: array
                  items:
                    type: object
                    required: [area, suggestion]
                    properties:
                      area:
                        type: string
                        description: "The area of code or concern that needs improvement"
                      suggestion:
                        type: string
                        description: "Specific, actionable suggestion for the refactor agent"
                      severity:
                        type: string
                        enum: [critical, important, minor]
                        description: "How significant this improvement is"
                  description: "Specific improvements for the refactor agent, ordered by severity"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Evaluate (Attempt {{iter.iteration + 1}})

                Analyze the implementation attempt, check results, and code review above. Decide the strategy:

                **Check results:**
                - Lint: {{has(nodes.lint) && has(nodes.lint.exit_code) ? (nodes.lint.exit_code == 0 ? 'passed' : 'FAILED') : 'skipped'}}
                - Test: {{has(nodes.test) && has(nodes.test.exit_code) ? (nodes.test.exit_code == 0 ? 'passed' : 'FAILED') : 'skipped'}}
                - Build: {{has(nodes.build) && has(nodes.build.exit_code) ? (nodes.build.exit_code == 0 ? 'passed' : 'FAILED') : 'skipped'}}
                - Code Review: {{has(nodes.code_review) && has(nodes.code_review.response) && nodes.code_review.response != null ? nodes.code_review.response.grade : 'skipped'}}

                Focus on:
                1. Why did checks fail (if any)? What's the root cause?
                2. What did the code review identify? Are the suggestions critical or cosmetic?
                3. What abstractions or assumptions were wrong?
                4. What specific improvements should the refactor agent make?
                5. Should we improve what we have, or would starting from scratch be better?

                **Bias toward restarting** when the code is fighting the codebase's patterns.
                A clean implementation armed with hard-won understanding beats incrementally-patched code.
          save_message:
            role: assistant
            content: |
              ## Evaluation (Attempt {{iter.iteration + 1}}): {{has(output.response) ? output.response.strategy : 'N/A'}}

              {{has(output.response) ? output.response.diagnosis : 'Evaluation not available'}}

              {{has(output.response) && has(output.response.improvements) && size(output.response.improvements) > 0 ? '### Improvements for refactoring\n' + output.response.improvements.map(i, '- **' + i.area + '** (' + (has(i.severity) ? i.severity : 'unspecified') + '): ' + i.suggestion).join('\n') : ''}}

        # ── Refactor (conditional on evaluate strategy) ────────────────────────
        #
        # Only runs when evaluate says the strategy is not "proceed".
        # Applies the evaluation's improvements before the next iteration.
        # Uses the refactor preset for specialized code transformation.

        - id: refactor
          type: workflow
          condition: "'refactor' in inputs.steps"
          ref: builtin://agent
          presets:
            default: refactor
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Pipeline Step: Refactor (After Attempt {{iter.iteration + 1}})

                The evaluation above assessed the implementation and produced improvements. Your job is to apply them.

                **Read the evaluation's strategy carefully:**
                - If the strategy is **"improve"** — the approach is sound. Apply the specific improvements listed. Fix what's broken without rewriting what works.
                - If the strategy is **"restart"** — the approach is fundamentally wrong. Revert or delete the failed code and restructure from scratch, using the evaluation's insights about what patterns are actually correct.

                **Process:**
                1. Read the evaluation's improvements list — address them in severity order (critical first)
                2. Apply each improvement, running tests after each significant change
                3. Summarize what you changed and what the code looks like now

                **Do NOT:**
                - Ignore critical improvements
                - Add new features beyond what the improvements specify
                - Leave code in a broken state
          save_message:
            role: assistant
            content: |
              ## Refactoring Summary (After Attempt {{iter.iteration + 1}})
              {{output.response_text}}

      edges:
        - from: stash_failed
          default: implement
        - from: implement
          default: lint
        - from: implement
          default: test
        - from: implement
          default: build
        - from: lint
          default: join_checks
        - from: test
          default: join_checks
        - from: build
          default: join_checks
        - from: join_checks
          default: code_review
        - from: code_review
          default: evaluate
        - from: evaluate
          cases:
            - condition: "has(nodes.evaluate.response) && nodes.evaluate.response.strategy == 'proceed'"
              to: []
          default: refactor
      ui:
        positions:
          workflow:
            x: 50
            y: 300
          stash_failed:
            x: 400
            y: 300
          implement:
            x: 750
            y: 300
          lint:
            x: 1100
            y: 150
          test:
            x: 1100
            y: 300
          build:
            x: 1100
            y: 450
          join_checks:
            x: 1450
            y: 300
          code_review:
            x: 1800
            y: 300
          evaluate:
            x: 2150
            y: 300
          refactor:
            x: 2500
            y: 300

  # ── Completion ──────────────────────────────────────────────────────────────

  - id: success
    type: save_message
    args:
      role: assistant
      content: |
        ## Pipeline Complete
        
        All checks passed and implementation approved.

  - id: max_retries_reached
    type: save_message
    args:
      role: assistant
      content: |
        ## Pipeline Stopped

        Reached maximum retries ({{inputs.max_retries}}).

        Final status:
        - Lint: {{has(nodes.impl_loop) && has(nodes.impl_loop.lint_exit) ? (nodes.impl_loop.lint_exit == 0 ? 'passed' : 'failed (exit ' + string(nodes.impl_loop.lint_exit) + ')') : 'skipped'}}
        - Test: {{has(nodes.impl_loop) && has(nodes.impl_loop.test_exit) ? (nodes.impl_loop.test_exit == 0 ? 'passed' : 'failed (exit ' + string(nodes.impl_loop.test_exit) + ')') : 'skipped'}}
        - Build: {{has(nodes.impl_loop) && has(nodes.impl_loop.build_exit) ? (nodes.impl_loop.build_exit == 0 ? 'passed' : 'failed (exit ' + string(nodes.impl_loop.build_exit) + ')') : 'skipped'}}
        - Review: {{has(nodes.impl_loop) && has(nodes.impl_loop.review_grade) ? nodes.impl_loop.review_grade : 'skipped'}}
        - Evaluation: {{has(nodes.impl_loop) && has(nodes.impl_loop.eval_strategy) ? nodes.impl_loop.eval_strategy : 'skipped'}}

outputs:
  plan_summary: "{{nodes.planning.plan_summary}}"
  review_grade: "{{nodes.impl_loop.review_grade}}"
  eval_strategy: "{{nodes.impl_loop.eval_strategy}}"
  iterations: "{{nodes.impl_loop._iterations}}"

edges:
  - from: planning
    default: write_tests
  - from: write_tests
    default: start_app
  - from: start_app
    default: impl_loop
  - from: impl_loop
    cases:
      - to: max_retries_reached
        condition: >
          has(nodes.impl_loop.eval_strategy) && nodes.impl_loop.eval_strategy != 'proceed'
    default: success

ui:
  positions:
    workflow:
      x: -120
      y: 830
    planning:
      x: 200
      y: 820
    write_tests:
      x: 600
      y: 820
    start_app:
      x: 950
      y: 820
    impl_loop:
      x: 1300
      y: 820
    success:
      x: 1650
      y: 760
    max_retries_reached:
      x: 1650
      y: 920
