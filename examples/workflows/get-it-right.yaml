name: get-it-right
apiVersion: "0.0.5"
description: |
  Get It Right — for complex brownfield codebases where LLMs paper-mache code on top.
  The insight: sometimes you need to try and fail to truly understand the codebase.

  Loop: implement → evaluate → [proceed or refactor → loop back]
    1. implement — Try to build the requested changes.
    2. evaluate — Assess the implementation: what worked, what didn't, what to do next.
    3. refactor — If not proceeding, apply the evaluation's improvements before the next attempt.

  After the loop:
    4. diagnose — Final synthesis of all learnings into an actionable implementation guide.
    5. implement — Clean, correct implementation armed with everything learned.

  The evaluation step decides the strategy:
    - "proceed" — understanding is sufficient, break the loop
    - "improve" — approach is sound but has specific fixable issues, refactor and retry
    - "restart" — approach is fundamentally wrong, refactor by scrapping and starting fresh

  Thread architecture:
    attempt loop inherits main thread so learnings accumulate across iterations.
    implement forks so failed code stays isolated; summary saved to main thread.
    evaluate forks for clean analysis; structured diagnosis saved to main thread.
    refactor forks to apply improvements; summary saved to main thread.
    diagnose forks for final synthesis; implementation guide saved to main thread.
    final implement forks for the clean implementation.

entry: [attempt]

inputs:
  model:
    type: model
    description: LLM model to use for all phases
    default:
      tags: [flagship]

  max_retries:
    type: integer
    default: 2
    min: 1
    max: 5
    description: Maximum implement→evaluate→refactor iterations before moving to final implementation

  mode:
    type: enum
    ui: toolbar
    default: auto
    description: Execution mode for agent steps.
    enum: [manual, auto, plan]

  yield:
    type: boolean
    ui: toolbar
    default: true
    description: Pause for user review after diagnosis before final implementation.

  temperature:
    type: number
    default: 1.0
    min: 0
    max: 1
    description: Response randomness

  thinking_level:
    type: enum
    enum: [low, medium, high, xhigh]
    default: medium
    description: Extended thinking level

nodes:
  # ── Attempt loop (implement → evaluate → refactor) ──────────────────────────
  #
  # Each iteration: implement the changes, evaluate what happened, then refactor
  # if the evaluation says we're not ready to proceed. The loop exits when
  # evaluate says "proceed" or we hit max_retries.

  - id: attempt
    type: loop
    while: >
      has(outputs.strategy) && outputs.strategy != "proceed"
      && iter.iteration < inputs.max_retries
    inline:
      entry: [implement]

      outputs:
        strategy: "{{has(nodes.evaluate) && has(nodes.evaluate.response) ? nodes.evaluate.response.strategy : 'restart'}}"
        diagnosis: "{{has(nodes.evaluate) && has(nodes.evaluate.response) ? nodes.evaluate.response.diagnosis : ''}}"

      nodes:
        - id: implement
          type: workflow
          ref: builtin://agent
          presets:
            default: general
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
            temperature: "{{inputs.temperature}}"
            thinking_level: "{{inputs.thinking_level}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Get It Right — Attempt {{iter.iteration + 1}}

                {{iter.iteration == 0 ? 'Implement the requested changes. Start by investigating the relevant code, then make your changes and run tests to verify them.' : 'Previous attempt was evaluated and refactored above. Read the evaluation and refactoring summary carefully before continuing. Build on the refactored code — do not redo work that has already been improved.'}}

                After finishing, summarize:
                1. What you changed and why
                2. What tests you ran and their results
                3. What surprised you about the codebase
                4. What you're uncertain about
          save_message:
            role: assistant
            content: |
              ## Attempt {{iter.iteration + 1}} — Implementation Summary
              {{output.response_text}}

        - id: evaluate
          type: workflow
          ref: builtin://structured-agent
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
            temperature: "{{inputs.temperature}}"
            thinking_level: "{{inputs.thinking_level}}"
            response_tool_name: submit_evaluation
            response_tool_description: "Submit your evaluation of the implementation attempt and recommended strategy"
            response_schema:
              type: object
              required:
                - strategy
                - diagnosis
                - difficulty_areas
                - wrong_abstractions
                - improvements
              properties:
                strategy:
                  type: string
                  enum: ["improve", "restart", "proceed"]
                  description: |
                    "proceed" — the implementation is correct and complete, break the loop.
                    "restart" — the approach is fundamentally wrong; the refactor agent should scrap it and start fresh with what we've learned. Prefer this when the code is fighting the codebase's grain or layering hacks on hacks.
                    "improve" — the approach is sound but has specific fixable issues for the refactor agent to address.
                difficulty_areas:
                  type: string
                  description: "What was harder than expected and why"
                wrong_abstractions:
                  type: string
                  description: "What abstractions or assumptions were wrong"
                improvements:
                  type: array
                  items:
                    type: object
                    required: [area, suggestion]
                    properties:
                      area:
                        type: string
                        description: "The area of code or concept that needs improvement"
                      suggestion:
                        type: string
                        description: "Specific, actionable suggestion for the refactor agent"
                      severity:
                        type: string
                        enum: [critical, important, minor]
                        description: "How significant this improvement is"
                  description: "Specific improvement suggestions for the refactor agent, ordered by severity"
                diagnosis:
                  type: string
                  description: "Complete analysis of the attempt — what worked, what didn't, and why"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Get It Right — Evaluate Attempt {{iter.iteration + 1}}

                Analyze the implementation attempt above. Focus on:
                1. What was harder than expected? Why?
                2. What abstractions or assumptions about the codebase were wrong?
                3. What specific improvements should the refactor agent make? (List them concretely)
                4. Should we improve what we have, or would starting from scratch be better?

                Be brutally honest. The goal is understanding, not saving face.

                **Bias toward restarting.** Code that fights the codebase's existing patterns usually gets worse with patches, not better. If the approach feels like it's swimming upstream — if you're working around the architecture rather than with it — recommend "restart". The learnings from this attempt are the real value; the code itself is disposable. A clean implementation armed with hard-won understanding almost always beats an incrementally-patched first attempt.
          save_message:
            role: assistant
            content: |
              ## Evaluation — Attempt {{iter.iteration + 1}}
              **Strategy:** {{has(output.response) ? output.response.strategy : 'N/A'}}

              {{has(output.response) ? output.response.diagnosis : 'Evaluation not available'}}

              **Difficulty areas:** {{has(output.response) ? output.response.difficulty_areas : 'N/A'}}
              **Wrong abstractions:** {{has(output.response) ? output.response.wrong_abstractions : 'N/A'}}

              {{has(output.response) && has(output.response.improvements) ? '**Improvements for refactoring:**' : ''}}
              {{has(output.response) && has(output.response.improvements) ? output.response.improvements : ''}}

        - id: refactor
          type: workflow
          ref: builtin://agent
          presets:
            default: refactor
          args:
            model: "{{inputs.model}}"
            mode: "{{inputs.mode}}"
            temperature: "{{inputs.temperature}}"
            thinking_level: "{{inputs.thinking_level}}"
          thread:
            mode: fork
            memo: false
            inject:
              role: user
              content: |
                ## Get It Right — Refactor After Attempt {{iter.iteration + 1}}

                The evaluation above assessed the implementation and produced a list of improvements. Your job is to apply them.

                **Read the evaluation's strategy carefully:**
                - If the strategy is **"improve"** — the approach is sound. Apply the specific improvements listed. Fix what's broken without rewriting what works.
                - If the strategy is **"restart"** — the approach is fundamentally wrong. Revert or delete the failed code and restructure from scratch, using the evaluation's insights about what abstractions and patterns are actually correct. Don't try to salvage bad code — the learnings are the value, not the code.

                **Process:**
                1. Read the evaluation's improvements list — address them in severity order (critical first)
                2. Apply each improvement, running tests after each significant change
                3. Summarize what you changed and what the code looks like now

                **Do NOT:**
                - Ignore critical improvements
                - Add new features beyond what the improvements specify
                - Leave code in a broken state
          save_message:
            role: assistant
            content: |
              ## Refactoring Summary — After Attempt {{iter.iteration + 1}}
              {{output.response_text}}

      edges:
        - from: implement
          default: [evaluate]
        - from: evaluate
          cases:
            - condition: "has(nodes.evaluate.response) && nodes.evaluate.response.strategy == 'proceed'"
              to: []
          default: [refactor]

  # ── Final diagnosis / reflection ─────────────────────────────────────────────
  #
  # After the loop exits, do one final reflection that synthesizes all learnings
  # into actionable guidance for the implementation phase.

  - id: diagnose
    type: workflow
    ref: builtin://agent
    presets:
      default: planner
    args:
      model: "{{inputs.model}}"
      mode: "{{inputs.mode}}"
      yield: "{{inputs.yield}}"
      temperature: "{{inputs.temperature}}"
      thinking_level: high
    thread:
      mode: fork
      memo: false
      inject:
        role: user
        content: |
          ## Get It Right — Final Diagnosis

          Review all the attempt, evaluation, and refactoring summaries above. Synthesize everything learned into a clear, actionable implementation guide.

          **Produce:**
          1. **Key Insights** — What did we learn about this codebase that wasn't obvious?
          2. **Correct Approach** — Step-by-step, what's the right way to implement the changes? Should we build on the refactored code or start completely fresh?
          3. **Improvements Checklist** — Consolidated list of all improvements identified across attempts, ordered by severity
          4. **Pitfalls** — Numbered list of specific things to avoid (reference earlier failures)
          5. **Order of Operations** — What to do first, second, third
          6. **Files & Interfaces** — Specific files to touch and the key interfaces/abstractions to use correctly

          Be concrete and specific. This guide will be the sole reference for the implementation phase.
          If the attempts revealed the approach was fundamentally wrong, say so clearly and describe the right approach from scratch.
    save_message:
      role: assistant
      content: |
        ## Implementation Guide (from failure analysis)
        {{output.response_text}}

  # ── Final implementation ─────────────────────────────────────────────────────
  #
  # Armed with all the learnings and refactoring, do the correct implementation.

  - id: implement
    type: workflow
    ref: builtin://agent
    presets:
      default: general
    args:
      model: "{{inputs.model}}"
      mode: "{{inputs.mode}}"
      temperature: "{{inputs.temperature}}"
      thinking_level: "{{inputs.thinking_level}}"
    thread:
      mode: fork
      memo: false
      inject:
        role: user
        content: |
          ## Get It Right — Final Implementation

          The implementation guide above was built from real attempts, evaluations, and refactoring passes. This is the real implementation.

          **Process:**
          1. Read the implementation guide above carefully before writing any code
          2. If the guide recommends starting from scratch, do exactly that — don't try to salvage previous attempts
          3. Address each improvement and pitfall explicitly as you implement
          4. Follow the recommended order of operations
          5. Run tests after each significant change
          6. If the guide's approach doesn't work for some part, note the deviation and why

          **Do NOT:**
          - Ignore the pitfalls section — those are real failures that happened
          - Re-discover things already documented in the guide
          - Patch or band-aid over problems the guide identified — fix them properly
          - Skip running tests
    save_message:
      role: assistant
      content: |
        ## Implementation Complete
        {{output.response_text}}

outputs:
  strategy: "{{nodes.attempt.strategy}}"
  implementation: "{{nodes.implement.response_text}}"

edges:
  - from: attempt
    default: [diagnose]
  - from: diagnose
    default: [implement]
