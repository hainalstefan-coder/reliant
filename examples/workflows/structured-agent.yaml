name: structured-agent
apiVersion: "0.0.5"
description: |
  Agent that requires structured output via response tool. Unlike builtin://agent which yields on
  end_turn, this loops until the response tool is called. If LLM responds without tools, a reminder
  is injected. Access output via output.response (structured data) and output.completed (boolean).
presets:
  tag: agent
  default: general
entry: [agent_loop]

inputs:
  mode:
    type: enum
    enum: ["manual", "auto"]
    default: "auto"
    description: "Execution mode: manual = requires approval, auto = auto-approves"

  model:
    type: model
    description: LLM model to use
    default:
      tags: ["flagship"]
      providers: ["anthropic"]
  temperature:
    type: number
    default: 1.0
    min: 0
    max: 1
    description: Response randomness (0 = focused, 1 = creative)

  tools:
    type: tools
    default: ["tag:default"]
    description: Available tools for the agent
  system_prompt:
    type: string
    default: ""
    description: System prompt for the agent
  thinking_level:
    type: enum
    enum: [low, medium, high, xhigh]
    default: low
    description: Extended thinking level (support is model/provider dependent)
  spawn_presets:
    type: preset
    tags: [agent]
    multi: true
    default: []
    description: Presets available for spawn tool (empty = spawn disabled)

  response_tool_name:
    type: string
    default: "submit_response"
    description: Name of the required response tool
  response_tool_description:
    type: string
    default: "Submit your structured response to complete the task"
    description: Description shown to the LLM for the response tool

  response_schema:
    type: object
    description: "JSON Schema for the response tool output. The response is available via output.response."
    default:
      type: object
      required:
        - choice
        - value
      properties:
        choice:
          type: string
          enum:
            - complete
          description: "Task completed successfully - provide summary or result"
        value:
          type: string
          description: "Explanation or data for your choice"

  max_turns:
    type: integer
    default: 200
    min: 1
    max: 500
    description: Maximum agent loop iterations
  compaction_threshold:
    type: integer
    default: 185000
    min: 10000
    description: Token count to trigger context compaction

  yield:
    type: boolean
    default: false
    description: When true, wait for user interaction after agent completes before returning
    ui: hidden

outputs:
  # The structured response from the response tool (schema defined by response_schema input)
  response: "{{nodes.agent_loop.response}}"
  # Whether the response tool was called successfully
  completed: "{{nodes.agent_loop.completed}}"

nodes:
  - id: agent_loop
    type: loop
    # Continue while response tool not called AND under max turns
    while: outputs.completed != true && iter.iteration < inputs.max_turns
    yield: "{{inputs.yield || iter.iteration >= inputs.max_turns}}"
    inline:
      entry: [call_llm]

      outputs:
        # Guard with 'in' operator before indexing — response_data may not contain the key
        # when the LLM calls regular tools (not the response tool) in this iteration.
        # Also guard against response_data being null (happens when spawn tools are mixed
        # with regular tools — buildFinalToolResult drops response_data, normalizeOutput
        # backfills it as nil from proto pointer zero-value).
        response: "{{has(nodes.execute_tools) && has(nodes.execute_tools.response_data) && nodes.execute_tools.response_data != null && inputs.response_tool_name in nodes.execute_tools.response_data ? nodes.execute_tools.response_data[inputs.response_tool_name] : null}}"
        completed: "{{has(nodes.execute_tools) && has(nodes.execute_tools.response_data) && nodes.execute_tools.response_data != null && inputs.response_tool_name in nodes.execute_tools.response_data && nodes.execute_tools.response_data[inputs.response_tool_name] != null}}"

      nodes:
        - id: call_llm
          type: call_llm
          save_message:
            role: "{{output.message.role}}"
            content: "{{output.message.text}}"
            tool_calls: "{{output.tool_calls}}"
          args:
            model: "{{inputs.model}}"
            temperature: "{{inputs.temperature}}"
            thinking_level: "{{inputs.thinking_level}}"
            system_prompt: "{{inputs.system_prompt}}"
            # Include regular tools, response tool, and spawn
            tool_filter: "{{inputs.tools + [inputs.response_tool_name, spawn(workflow.name, inputs.spawn_presets)]}}"
            response_tool:
              name: "{{inputs.response_tool_name}}"
              description: "{{inputs.response_tool_description}}"
              schema: "{{inputs.response_schema}}"

        # No outgoing edge - just injects reminder, then loop continues
        - id: remind_response
          type: save_message
          args:
            role: system
            content: "You must call the `{{inputs.response_tool_name}}` tool to complete your turn. Please use this tool to submit your structured response."

        - id: approval
          type: approval
          args:
            title: Approve tool execution?
            timeout: 1h

        - id: execute_tools
          type: execute_tools
          save_message:
            role: tool
            content: ""
            tool_results: "{{output.tool_results}}"
          args:
            tool_calls: "{{nodes.call_llm.tool_calls}}"
            # Pre-creates key so CEL can safely access dynamic response_data[tool_name]
            expected_response_tools:
              - "{{inputs.response_tool_name}}"

        - id: compact
          type: compact
          timeout: "10m"

      edges:
        - from: call_llm
          cases:
            - to: approval
              condition: nodes.call_llm.tool_calls != null && size(nodes.call_llm.tool_calls) > 0 && inputs.mode == 'manual'
              label: require_approval
            - to: execute_tools
              condition: nodes.call_llm.tool_calls != null && size(nodes.call_llm.tool_calls) > 0 && inputs.mode != 'manual'
              label: auto_approve
            - to: remind_response
              condition: nodes.call_llm.tool_calls == null || size(nodes.call_llm.tool_calls) == 0
              label: no_tools

        - from: approval
          cases:
            - to: execute_tools
              condition: nodes.approval.status == 'approved'
              label: approved

        - from: execute_tools
          cases:
            - to: compact
              condition: nodes.execute_tools.thread_token_count > inputs.compaction_threshold
              label: needs_compact

      ui:
        positions:
          approval:
            x: 1002
            y: 104
          call_llm:
            x: 389
            y: 207.5
          compact:
            x: 1620
            y: 240.25
          execute_tools:
            x: 1270
            y: 235.25
          remind_response:
            x: 1023
            y: 356
          workflow:
            x: 50
            y: 200
        switches:
          switch-call_llm:
            source_node: call_llm
            position:
              x: 670
              y: 148.5
            cases:
              - id: case-0
                condition: nodes.call_llm.tool_calls != null && size(nodes.call_llm.tool_calls) > 0 && inputs.mode == 'manual'
                label: require_approval
              - id: case-1
                condition: nodes.call_llm.tool_calls != null && size(nodes.call_llm.tool_calls) > 0 && inputs.mode != 'manual'
                label: auto_approve
              - id: case-2
                condition: nodes.call_llm.tool_calls == null || size(nodes.call_llm.tool_calls) == 0
                label: no_tools

  - id: max_turns_notification
    type: save_message
    args:
      role: "system"
      display_style: "warning"
      content: "Agent reached maximum iteration limit ({{inputs.max_turns}} turns). The conversation will pause — send a message to continue."

edges:
  - from: agent_loop
    cases:
      - to: max_turns_notification
        condition: nodes.agent_loop._iterations >= inputs.max_turns
        label: "max_turns_reached"

ui:
  positions:
    agent_loop:
      x: 445
      y: 250
    max_turns_notification:
      x: 917
      y: 283
    workflow:
      x: 150
      y: 270
